<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Photo Album</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        input,
        button {
            padding: 8px 12px;
            margin: 5px;
            font-size: 14px;
        }

        #results {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        #results img {
            width: 200px;
            height: 160px;
            object-fit: cover;
            border-radius: 6px;
        }

        .section {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <h1>📷 AI Photo Album</h1>

    <div class="section">
        <h2>Search Photos</h2>
        <input type="text" id="searchInput" placeholder="e.g. show me dogs" style="width:60%">
        <button onclick="searchPhotos()">Search</button>
        <div id="results"></div>
    </div>

    <div class="section">
        <h2>Upload Photo</h2>
        <input type="file" id="photoFile" accept="image/*">
        <input type="text" id="customLabels" placeholder="Custom labels (e.g. Sam, Sally)">
        <button onclick="uploadPhoto()">Upload</button>
        <p id="uploadStatus"></p>
    </div>

    <script>
        const API_BASE = 'https://4jrayiodqh.execute-api.us-east-1.amazonaws.com/prod';

        async function searchPhotos() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;

            document.getElementById('results').innerHTML = '<p>Searching...</p>';

            try {
                const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(q)}`);
                console.log('Search status:', res.status);
                const data = await res.json();
                console.log('Search data:', data);

                const container = document.getElementById('results');
                container.innerHTML = '';

                if (!data.results || data.results.length === 0) {
                    container.innerHTML = '<p>No results found.</p>';
                    return;
                }

                data.results.forEach(photo => {
                    const img = document.createElement('img');
                    img.src = photo.url;
                    img.title = photo.labels.join(', ');
                    img.onerror = () => { img.alt = 'Failed to load: ' + photo.url; };
                    container.appendChild(img);
                });

            } catch (err) {
                console.error('Search error:', err);
                document.getElementById('results').innerHTML = `<p>❌ Search error: ${err.message}</p>`;
            }
        }

        async function uploadPhoto() {
            const file = document.getElementById('photoFile').files[0];
            const customLabels = document.getElementById('customLabels').value.trim();

            if (!file) { alert('Select a file first'); return; }

            const statusMsg = document.getElementById('uploadStatus');
            statusMsg.style.color = 'black';
            statusMsg.textContent = '⏳ Uploading...';

            try {
                let presignedReq = `${API_BASE}/upload?filename=${encodeURIComponent(file.name)}&contentType=${encodeURIComponent(file.type)}`;
                if (customLabels) {
                    presignedReq += `&customlabels=${encodeURIComponent(customLabels)}`;
                }

                const urlRes = await fetch(presignedReq);
                const urlData = await urlRes.json();

                if (!urlData.uploadUrl) {
                    statusMsg.textContent = '❌ Upload failed';
                    statusMsg.style.color = 'red';
                    return;
                }

                const uploadRes = await fetch(urlData.uploadUrl, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': file.type
                    },
                    body: file
                });

                if (uploadRes.ok) {
                    statusMsg.textContent = '✅ Upload successful';
                    statusMsg.style.color = 'green';
                    document.getElementById('photoFile').value = '';
                    document.getElementById('customLabels').value = '';
                } else {
                    statusMsg.textContent = '❌ Upload failed';
                    statusMsg.style.color = 'red';
                }

            } catch (err) {
                console.error('Error:', err);
                statusMsg.textContent = '❌ Upload failed';
                statusMsg.style.color = 'red';
            }
        }
    </script>
</body>

</html>
